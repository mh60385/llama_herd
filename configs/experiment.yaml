number_of_agents: 1
episodes_per_run: 1
max_search_results: 10
max_selected_sources: 1
max_source_chars: 4000
temperature: 0.7
top_p: 0.9
inter_episode_delay_seconds: 2.0
system_monitor_enabled: true
llm_container_name: llama-server
memory_warn_available_mb: 1500
memory_restart_available_mb: 1200
swap_warn_used_mb: 2500
temperature_warn_c: 75.0
temperature_pause_c: 80.0
temperature_stop_c: 85.0
thermal_cooldown_seconds: 60.0
thermal_max_cooldown_cycles: 5
llm_restart_every_episodes: 10
reasoning: off
profile_update_mode: proposal_then_apply
allow_profile_drift: true
search_failure_is_valid_episode_data: true
